<!doctype html>
<html lang="bs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sattlio — Rezervacije termina za salone i uslužne djelatnosti</title>
    <meta name="description" content="Jednostavna SaaS platforma za upravljanje rezervacijama, zaposlenima, klijentima i kalendarom. 14 dana besplatnog probnog perioda." />
    <meta name="keywords" content="rezervacije, booking, salon, frizer, kalendar, SaaS, BiH, Sattlio" />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="bs_BA" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sattlio" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      /* Splash ekran - staticki HTML/CSS, ne cekaju se React/Tailwind bundle-ovi.
         Ziv u #root, pa ga React automatski ukloni cim se app.render() izvrsi -
         nema potrebe za tajmerima niti rucnim sakrivanjem. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #f8fafc;
      }
      #splash .badge {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: #2563eb;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Inter, system-ui, sans-serif;
        font-weight: 700;
        font-size: 30px;
        animation: splash-pulse 1.4s ease-in-out infinite;
      }
      #splash span.word {
        font-family: Inter, system-ui, sans-serif;
        font-weight: 700;
        font-size: 19px;
        color: #1e293b;
        letter-spacing: 0.02em;
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.55; transform: scale(0.93); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="splash">
        <span class="badge" aria-hidden="true">S</span>
        <span class="word">Sattlio</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/register-sw.js"></script>
  </body>
</html>
